# .github/workflows/ci.yml

name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install JS/TS Dependencies
      run: bun install --cwd preprocessing-engine

    - name: Lint JS/TS Codebase
      run: bun --cwd preprocessing-engine run lint

    - name: Build Monorepo
      run: bun --cwd preprocessing-engine run build

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'preprocessing-engine/services/ai/pyproject.toml'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install preprocessing-engine/services/ai/

    - name: Verify FastAPI Syntax
      run: |
        python -m py_compile preprocessing-engine/services/ai/main.py
