# .github/workflows/ci.yml

name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
        cache-dependency-path: 'preprocessing-engine/pnpm-lock.yaml'

    - name: Install JS/TS Dependencies
      run: pnpm --dir preprocessing-engine install --frozen-lockfile

    - name: Lint JS/TS Codebase
      run: pnpm --dir preprocessing-engine lint

    - name: Build Monorepo
      run: pnpm --dir preprocessing-engine build

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'preprocessing-engine/services/ai/requirements.txt'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r preprocessing-engine/services/ai/requirements.txt

    - name: Verify FastAPI Syntax
      run: |
        python -m py_compile preprocessing-engine/services/ai/main.py
